name: Build inpsAndroid

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Tests
      run: ./gradlew test

    - name: Build AAR file
      run: ./gradlew assembleRelease

    - name: Extract Version and Changes
      id: metadata
      run: |
        VERSION=$(grep -oP "version\s*=\s*['\"]\K[^'\"]+" inpsAndroid/build.gradle | head -n 1)
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        
        echo "CHANGES<<EOF" >> $GITHUB_ENV
        grep "^\s*//\s*-" inpsAndroid/build.gradle | sed 's/^\s*\/\/\s*//' >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Create Release and Upload AAR
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Check if the tag already exists so the workflow doesn't fail on multiple pushes to the same version
        if gh release view "inpsAndroid-v${{ env.VERSION }}" > /dev/null 2>&1; then
          echo "Release inpsAndroid-v${{ env.VERSION }} already exists. Skipping release creation."
        else
          echo "Creating new release inpsAndroid-v${{ env.VERSION }}"
          
          RELEASE_NOTES="Auto-generated release.

          Version: v${{ env.VERSION }}
          Built from latest commit.
          
          Changes:
          ${{ env.CHANGES }}"
          
          # Creates the Tag, the Release page, and uploads the .aar file to it!
          gh release create "inpsAndroid-v${{ env.VERSION }}" \
            inpsAndroid/build/outputs/aar/inpsAndroid-release.aar \
            --title "inpsAndroid-v${{ env.VERSION }}" \
            --notes "$RELEASE_NOTES" \
            --target ${{ github.sha }}
        fi